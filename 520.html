<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>抛物线运动分析</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #050505;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.06);
    --text: #f5f5f7;
    --text2: #86868b;
    --blue: #0a84ff;
    --green: #30d158;
    --red: #ff453a;
    --orange: #ff9f0a;
    --glow-green: rgba(48,209,88,0.3);
    --glow-red: rgba(255,69,58,0.3);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* 背景网格 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 430px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* 头部 */
  .hero {
    padding: 32px 0 20px;
    text-align: center;
  }
  .hero-label {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: rgba(10,132,255,0.1);
    border: 1px solid rgba(10,132,255,0.15);
    padding: 5px 12px;
    border-radius: 100px;
    margin-bottom: 12px;
  }
  .hero-label::before {
    content: '';
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--blue);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(10,132,255,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(10,132,255,0); }
  }
  .hero h1 {
    font-size: 24px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    background: linear-gradient(135deg, #fff 0%, #a1a1a6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hero p {
    font-size: 12px;
    color: var(--text2);
    margin-top: 6px;
    line-height: 1.4;
  }

  /* 面板 */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    margin-bottom: 16px;
    overflow: hidden;
    position: relative;
  }
  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  }

  /* Canvas 区域 */
  .motion-area {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }
  .motion-cell {
    background: var(--surface);
    position: relative;
    height: 200px;
    overflow: hidden;
  }
  .motion-cell canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  .motion-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 10px;
    font-weight: 700;
    color: var(--text2);
    background: rgba(0,0,0,0.4);
    padding: 4px 10px;
    border-radius: 8px;
    backdrop-filter: blur(8px);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .motion-data {
    position: absolute;
    bottom: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  .motion-data span {
    font-size: 10px;
    font-weight: 600;
    color: var(--text2);
    background: rgba(0,0,0,0.4);
    padding: 3px 8px;
    border-radius: 6px;
    backdrop-filter: blur(8px);
  }
  .motion-data span b {
    color: var(--text);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .motion-flow {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .v5-tag {
    font-size: 8px;
    font-weight: 600;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.04em;
  }

  /* 控制按钮 */
  .ctrl {
    display: flex;
    gap: 10px;
    padding: 14px 16px;
  }
  .ctrl button {
    flex: 1;
    border: none;
    border-radius: 14px;
    padding: 12px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .ctrl button:active { transform: scale(0.97); }
  .ctrl .go {
    background: linear-gradient(135deg, #0a84ff, #0066cc);
    color: #fff;
    box-shadow: 0 4px 20px rgba(10,132,255,0.25);
  }
  .ctrl .go:hover { box-shadow: 0 6px 28px rgba(10,132,255,0.35); }
  .ctrl .re {
    background: var(--surface-hover);
    color: var(--text);
    border: 1px solid var(--border);
  }

  /* 能量面板 */
  .energy-hd {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px 0;
  }
  .energy-hd h2 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .energy-flow {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .flow-pip {
    width: 7px; height: 7px;
    border-radius: 50%;
    position: relative;
  }
  .flow-pip.g { background: var(--green); box-shadow: 0 0 8px var(--glow-green); }
  .flow-pip.r { background: var(--red); box-shadow: 0 0 8px var(--glow-red); }
  .flow-pip::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 50%;
    animation: pip-glow 2s ease-out infinite;
  }
  .flow-pip.g::after { background: var(--glow-green); }
  .flow-pip.r::after { background: var(--glow-red); }
  @keyframes pip-glow {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(2.5); opacity: 0; }
  }
  .flow-strip {
    width: 60px; height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
    position: relative;
  }
  .flow-strip .bar {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 55%;
    border-radius: 2px;
    animation: flow-shift 3s ease-in-out infinite;
  }
  .flow-strip.gr .bar { background: linear-gradient(90deg, var(--green), var(--red)); }
  .flow-strip.rg .bar { background: linear-gradient(90deg, var(--red), var(--green)); }
  @keyframes flow-shift {
    0%, 100% { left: 0; opacity: 0.8; }
    50% { left: 45%; opacity: 1; }
  }

  /* 大数字计数器 */
  .counters {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 16px 20px 20px;
  }
  .counter {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s ease;
  }
  .counter::after {
    content: '';
    position: absolute;
    top: 0; left: 20px; right: 20px;
    height: 2px;
    border-radius: 0 0 2px 2px;
    opacity: 0.6;
  }
  .counter.green::after { background: linear-gradient(90deg, transparent, var(--green), transparent); }
  .counter.red::after { background: linear-gradient(90deg, transparent, var(--red), transparent); }
  .counter-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }
  .counter-val {
    font-size: 22px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
    line-height: 1.2;
    min-height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .counter.green .counter-val { color: var(--green); text-shadow: 0 0 20px var(--glow-green); }
  .counter.red .counter-val { color: var(--red); text-shadow: 0 0 20px var(--glow-red); }
  .counter-range {
    font-size: 10px;
    color: var(--text2);
    margin-top: 8px;
    font-weight: 500;
  }
  .counter-range span { opacity: 0.5; }

  /* 城市可折叠面板 */
  .city-wrap {
    transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
    max-height: 420px;
  }
  .city-wrap.collapsed {
    max-height: 56px;
  }
  .city-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    position: relative;
  }
  .city-toggle:active { opacity: 0.7; }
  .city-toggle-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .city-toggle-title {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .city-toggle-dots {
    display: flex;
    gap: 5px;
  }
  .city-toggle-dots i {
    width: 6px; height: 6px;
    border-radius: 50%;
    display: block;
  }
  .city-toggle-dots i.dg { background: var(--green); box-shadow: 0 0 6px var(--glow-green); }
  .city-toggle-dots i.dr { background: var(--red); box-shadow: 0 0 6px var(--glow-red); }
  .city-toggle-dots i.do { background: var(--orange); box-shadow: 0 0 6px rgba(255,159,10,0.3); }
  .city-toggle-arrow {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    flex-shrink: 0;
  }
  .city-toggle-arrow svg {
    width: 12px; height: 12px;
    fill: none;
    stroke: var(--text2);
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .city-wrap.collapsed .city-toggle-arrow {
    transform: rotate(180deg);
  }
  .city-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 0 20px 20px;
  }
  .city-chip {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 12px 10px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s ease;
  }
  .city-chip::before {
    content: '';
    position: absolute;
    top: 0; left: 10px; right: 10px;
    height: 2px;
    border-radius: 0 0 2px 2px;
    opacity: 0.5;
  }
  .city-chip.gn::before { background: var(--green); }
  .city-chip.rd::before { background: var(--red); }
  .city-chip.og::before { background: var(--orange); }
  .city-chip-row1 {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .city-chip-name {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.04em;
  }
  .city-chip-tag {
    display: inline-block;
    font-size: 8px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 100px;
    letter-spacing: 0.04em;
  }
  .city-chip.gn .city-chip-tag { background: rgba(48,209,88,0.12); color: var(--green); }
  .city-chip.rd .city-chip-tag { background: rgba(255,69,58,0.12); color: var(--red); }
  .city-chip.og .city-chip-tag { background: rgba(255,159,10,0.12); color: var(--orange); }
  .city-chip-num {
    font-size: 14px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    min-height: 18px;
  }
  .city-chip-num.g { color: var(--green); text-shadow: 0 0 12px var(--glow-green); }
  .city-chip-num.r { color: var(--red); text-shadow: 0 0 12px var(--glow-red); }
  .city-chip-track {
    height: 2px;
    background: rgba(255,255,255,0.04);
    border-radius: 1px;
    margin-top: 6px;
    position: relative;
    overflow: visible;
  }
  .city-chip-track-bar {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    border-radius: 1px;
    transition: width 0.15s linear;
  }
  .city-chip-track-bar.g { background: var(--green); box-shadow: 0 0 4px var(--glow-green); }
  .city-chip-track-bar.r { background: var(--red); box-shadow: 0 0 4px var(--glow-red); }

  /* 原理 */
  .info {
    padding: 20px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text2);
  }
  .info p + p { margin-top: 8px; }

  .ft {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-label">实时监测</div>
    <h1>抛物线运动分析</h1>
    <p>抛体运动轨迹可视化与能量数据监测</p>
  </div>

  <!-- 运动可视化 -->
  <div class="panel">
    <div class="motion-area">
      <div class="motion-cell">
        <div class="motion-badge">斜抛</div>
        <div class="motion-flow">
          <span class="v5-tag">v5</span>
          <div class="flow-pip g"></div>
          <div class="flow-strip gr"><div class="bar"></div></div>
          <div class="flow-pip r"></div>
        </div>
        <canvas id="canvas1"></canvas>
        <div class="motion-data">
          <span>H <b id="h1">0.0</b></span>
          <span>X <b id="x1">0.0</b></span>
          <span>T <b id="t1">0.0</b></span>
        </div>
      </div>
      <div class="motion-cell">
        <div class="motion-badge">平抛</div>
        <div class="motion-flow">
          <span class="v5-tag">v5</span>
          <div class="flow-pip r"></div>
          <div class="flow-strip rg"><div class="bar"></div></div>
          <div class="flow-pip g"></div>
        </div>
        <canvas id="canvas2"></canvas>
        <div class="motion-data">
          <span>H <b id="h2">60.0</b></span>
          <span>X <b id="x2">0.0</b></span>
          <span>T <b id="t2">0.0</b></span>
        </div>
      </div>
    </div>
    <div class="ctrl">
      <button class="go" onclick="startBoth()">开始演示</button>
      <button class="re" onclick="resetBoth()">重置</button>
    </div>
  </div>

  <!-- 城市监测 -->
  <div class="panel">
    <div class="city-wrap collapsed" id="cityWrap">
      <div class="city-toggle" onclick="toggleCity()">
        <div class="city-toggle-left">
          <span class="city-toggle-title">城市数据监测</span>
          <div class="city-toggle-dots">
            <i class="dg"></i><i class="dr"></i>
          </div>
        </div>
        <div class="city-toggle-arrow" id="cityArrow">
          <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
      </div>
      <div class="city-grid">
        <div class="city-chip gn" data-city="上海" data-type="g" data-from="0" data-to="-100000000">
          <div class="city-chip-row1">
            <div class="city-chip-name">上海 ◈深圳</div>
            <div class="city-chip-tag">增绿</div>
          </div>
          <div class="city-chip-num g" id="city-s1">0</div>
          <div class="city-chip-track"><div class="city-chip-track-bar g" style="width:0%"></div></div>
        </div>
        <div class="city-chip rd" data-city="上海" data-type="r" data-from="100000000" data-to="0">
          <div class="city-chip-row1">
            <div class="city-chip-name">上海 ◈深圳</div>
            <div class="city-chip-tag">增红</div>
          </div>
          <div class="city-chip-num r" id="city-s2">1亿</div>
          <div class="city-chip-track"><div class="city-chip-track-bar r" style="width:100%"></div></div>
        </div>
        </div>
    </div>
  </div>

  <!-- SC能量 -->
  <div class="panel">
    <div class="energy-hd">
      <h2>SC能量 v5</h2>
    </div>
    <div class="counters">
      <div class="counter green">
        <div class="counter-label">负增长区间</div>
        <div class="counter-val" id="cnt-g">0</div>
        <div class="counter-range"><span>0</span> → -1亿</div>
      </div>
      <div class="counter red">
        <div class="counter-label">正增长区间</div>
        <div class="counter-val" id="cnt-r">1亿</div>
        <div class="counter-range">1亿 → <span>0</span></div>
      </div>
    </div>
  </div>

  <!-- 原理 -->
  <div class="panel">
    <div class="info">
      <p>抛体运动可分解为水平方向的匀速直线运动和竖直方向的匀变速直线运动。忽略空气阻力时，水平速度保持不变，竖直方向受重力加速度 g = 9.8 m/s² 影响。</p>
      <p>轨迹呈抛物线形状，其形态由初速度大小、抛射角度以及重力加速度共同决定。</p>
    </div>
  </div>
</div>

<div class="ft">抛物线运动可视化实验 · 物理学研究</div>

<script>
  // ========== Utils ==========
  const BLUE = [10, 132, 255];
  const RED = [255, 69, 58];
  function lerp(a, b, t) { return a + (b - a) * t; }
  function lerpColor(c1, c2, p) {
    return `rgb(${Math.round(lerp(c1[0],c2[0],p))},${Math.round(lerp(c1[1],c2[1],p))},${Math.round(lerp(c1[2],c2[2],p))})`;
  }
  function drawGradientLine(ctx, pts, c1, c2, alpha, lw) {
    ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    for (let i = 0; i < pts.length - 1; i++) {
      const p = i / (pts.length - 1);
      const col = lerpColor(c1, c2, p);
      ctx.strokeStyle = col.replace('rgb', 'rgba').replace(')', `,${alpha})`);
      ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[i+1].x, pts[i+1].y); ctx.stroke();
    }
  }
  function resizeC(c) {
    const r = c.parentElement.getBoundingClientRect();
    c.width = r.width * 2; c.height = r.height * 2;
    c.style.width = r.width + 'px'; c.style.height = r.height + 'px';
    c.getContext('2d').scale(2, 2);
  }
  function drawGrid(ctx, w, h) {
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < w; i += 30) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, h); ctx.stroke(); }
    for (let i = 0; i < h; i += 30) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(w, i); ctx.stroke(); }
  }
  function drawGround(ctx, w, h) {
    ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(20, h - 30); ctx.lineTo(w - 20, h - 30); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    for (let i = 0; i <= 5; i++) { const x = 30 + (w - 60) * i / 5; ctx.beginPath(); ctx.moveTo(x, h - 30); ctx.lineTo(x, h - 25); ctx.stroke(); ctx.fillText((i * 10) + 'm', x, h - 14); }
  }
  function drawBall(ctx, x, y, r = 8, colorRGB = BLUE) {
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath(); ctx.ellipse(x + 2, y + r + 2, r, r * 0.3, 0, 0, Math.PI * 2); ctx.fill();
    const g = ctx.createRadialGradient(x - 3, y - 3, 0, x, y, r);
    const [cr, cg, cb] = colorRGB;
    g.addColorStop(0, `rgb(${Math.min(255, cr+90)},${Math.min(255, cg+90)},${Math.min(255, cb+90)})`);
    g.addColorStop(0.5, `rgb(${cr},${cg},${cb})`);
    g.addColorStop(1, `rgb(${Math.max(0, cr-60)},${Math.max(0, cg-60)},${Math.max(0, cb-60)})`);
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.arc(x - 3, y - 3, r * 0.35, 0, Math.PI * 2); ctx.fill();
  }
  function drawTrail(ctx, trails, c1, c2) {
    for (let i = 0; i < trails.length; i++) { const p = (trails.length > 1) ? i / (trails.length - 1) : 0; const col = lerpColor(c1, c2, p); const a = (i / trails.length) * 0.4; ctx.fillStyle = col.replace('rgb', 'rgba').replace(')', `,${a})`); const r = 2 + (i / trails.length) * 2; ctx.beginPath(); ctx.arc(trails[i].x, trails[i].y, r, 0, Math.PI * 2); ctx.fill(); }
  }

  // ========== 实验一 ==========
  const canvas1 = document.getElementById('canvas1');
  const ctx1 = canvas1.getContext('2d');
  let anim1 = null, trails1 = [];
  resizeC(canvas1);
  function drawExp1Frame(t, maxT) {
    const w = canvas1.width / 2, h = canvas1.height / 2;
    ctx1.clearRect(0, 0, w, h); drawGrid(ctx1, w, h); drawGround(ctx1, w, h);
    const v0 = 25, theta = 60 * Math.PI / 180, g = 9.8;
    const sx = (w - 60) / 70, sy = (h - 60) / 35;
    const pts = [];
    for (let time = 0; time <= maxT; time += 0.02) {
      const px = 30 + v0 * Math.cos(theta) * time * sx;
      const py = h - 30 - (v0 * Math.sin(theta) * time - 0.5 * g * time * time) * sy;
      if (py > h - 30) break;
      pts.push({x: px, y: py});
    }
    drawGradientLine(ctx1, pts, BLUE, RED, 0.18, 2);
    const x = v0 * Math.cos(theta) * t;
    const y = v0 * Math.sin(theta) * t - 0.5 * g * t * t;
    const px = 30 + x * sx, py = h - 30 - y * sy;
    const progress = t / maxT;
    const ballColor = lerpColor(BLUE, RED, progress).match(/\d+/g).map(Number);
    if (y >= 0) { trails1.push({ x: px, y: py }); if (trails1.length > 40) trails1.shift(); }
    drawTrail(ctx1, trails1, BLUE, RED);
    if (y >= 0) drawBall(ctx1, px, py, 8, ballColor);
    document.getElementById('h1').textContent = Math.max(0, y).toFixed(1);
    document.getElementById('x1').textContent = x.toFixed(1);
    document.getElementById('t1').textContent = t.toFixed(2);
  }
  function startExp1() { if (anim1) cancelAnimationFrame(anim1); trails1 = []; const maxT = 3.5; let startTime = null; function animate(ts) { if (!startTime) startTime = ts; const t = Math.min((ts - startTime) / 1000, maxT); drawExp1Frame(t, maxT); if (t < maxT) anim1 = requestAnimationFrame(animate); } anim1 = requestAnimationFrame(animate); }
  function resetExp1() { if (anim1) cancelAnimationFrame(anim1); trails1 = []; const w = canvas1.width / 2, h = canvas1.height / 2; ctx1.clearRect(0, 0, w, h); drawGrid(ctx1, w, h); drawGround(ctx1, w, h); drawBall(ctx1, 30, h - 30, 8, BLUE); document.getElementById('h1').textContent = '0.0'; document.getElementById('x1').textContent = '0.0'; document.getElementById('t1').textContent = '0.0'; }
  resetExp1();

  // ========== 实验二 ==========
  const canvas2 = document.getElementById('canvas2');
  const ctx2 = canvas2.getContext('2d');
  let anim2 = null, trails2 = [];
  resizeC(canvas2);
  function drawExp2Frame(t, maxT) {
    const w = canvas2.width / 2, h = canvas2.height / 2;
    ctx2.clearRect(0, 0, w, h); drawGrid(ctx2, w, h); drawGround(ctx2, w, h);
    const h0 = 60, v0 = 12, g = 9.8; const sx = (w - 60) / 45, sy = (h - 60) / 70;
    const pts = [];
    for (let time = 0; time <= maxT; time += 0.02) { const px = 30 + v0 * time * sx; const py = h - 30 - (h0 - 0.5 * g * time * time) * sy; pts.push({x: px, y: py}); }
    drawGradientLine(ctx2, pts, RED, BLUE, 0.18, 2);
    ctx2.fillStyle = 'rgba(255,255,255,0.08)'; ctx2.fillRect(25, h - 30 - h0 * sy - 4, 10, 4);
    const x = v0 * t, y = Math.max(0, h0 - 0.5 * g * t * t); const px = 30 + x * sx, py = h - 30 - y * sy;
    const progress = t / maxT;
    const ballColor = lerpColor(RED, BLUE, progress).match(/\d+/g).map(Number);
    if (y > 0) { trails2.push({ x: px, y: py }); if (trails2.length > 40) trails2.shift(); }
    drawTrail(ctx2, trails2, RED, BLUE);
    if (y > 0) drawBall(ctx2, px, py, 8, ballColor);
    document.getElementById('h2').textContent = y.toFixed(1); document.getElementById('x2').textContent = x.toFixed(1); document.getElementById('t2').textContent = t.toFixed(2);
  }
  function startExp2() { if (anim2) cancelAnimationFrame(anim2); trails2 = []; const maxT = 2.5; let startTime = null; function animate(ts) { if (!startTime) startTime = ts; const t = Math.min((ts - startTime) / 1000, maxT); drawExp2Frame(t, maxT); if (t < maxT) anim2 = requestAnimationFrame(animate); } anim2 = requestAnimationFrame(animate); }
  function resetExp2() { if (anim2) cancelAnimationFrame(anim2); trails2 = []; const w = canvas2.width / 2, h = canvas2.height / 2; ctx2.clearRect(0, 0, w, h); drawGrid(ctx2, w, h); drawGround(ctx2, w, h); const h0 = 60, sy = (h - 60) / 70, py = h - 30 - h0 * sy; ctx2.fillStyle = 'rgba(255,255,255,0.08)'; ctx2.fillRect(25, py - 4, 10, 4); drawBall(ctx2, 30, py, 8, RED); document.getElementById('h2').textContent = '60.0'; document.getElementById('x2').textContent = '0.0'; document.getElementById('t2').textContent = '0.0'; }
  resetExp2();

  function startBoth() { startExp1(); startExp2(); }
  function resetBoth() { resetExp1(); resetExp2(); }

  window.addEventListener('resize', () => { resizeC(canvas1); resizeC(canvas2); resetExp1(); resetExp2(); });

  // ========== 数字格式化 ==========
  function fmtCN(n) {
    const sign = n < 0 ? '-' : '';
    const v = Math.abs(n);
    if (v >= 100000000) return sign + (v / 100000000).toFixed(1).replace(/\.0$/, '') + '亿';
    if (v >= 10000) return sign + Math.round(v / 10000) + '万';
    return String(n);
  }

  // ========== 计数器动画 ==========
  function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }

  function runCounter(el, from, to, duration, onTick) {
    function loop() {
      const start = performance.now();
      function tick(now) {
        const p = Math.min((now - start) / duration, 1);
        const e = easeInOutCubic(p);
        const val = Math.round(from + (to - from) * e);
        el.textContent = fmtCN(val);
        if (onTick) onTick(p);
        if (p < 1) { requestAnimationFrame(tick); } else { setTimeout(loop, 800); }
      }
      requestAnimationFrame(tick);
    }
    loop();
  }

  // 启动主计数器
  const cntG = document.getElementById('cnt-g');
  const cntR = document.getElementById('cnt-r');

  runCounter(cntG, 0, -100000000, 6000);
  runCounter(cntR, 100000000, 0, 6000);

  // 城市折叠切换
  function toggleCity() {
    const w = document.getElementById('cityWrap');
    w.classList.toggle('collapsed');
  }

  // 城市卡片动画
  document.querySelectorAll('.city-chip').forEach(chip => {
    const from = parseInt(chip.dataset.from);
    const to = parseInt(chip.dataset.to);
    const type = chip.dataset.type;
    const numEl = chip.querySelector('.city-chip-num');
    const barEl = chip.querySelector('.city-chip-track-bar');
    const isGreen = type === 'g';

    runCounter(numEl, from, to, 6000 + Math.random() * 2000, (p) => {
      const w = isGreen ? p * 100 : (1 - p) * 100;
      barEl.style.width = w + '%';
    });
  });
</script>
</body>
